<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתכונים חדשים</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

</head>
<body>
    <!-- ===============================
         TOP NAV (Desktop + Mobile Logout)
         =============================== -->
    <nav class="top-nav">
        <!-- Desktop links (hidden on mobile) -->
        <div class="desktop-links">
            <a href="index.html">ראשי</a>
            <a href="categories.html">קטגוריות</a>
            <a href="upload.html">העלאה</a>
            <a href="my-recipes.html">המתכונים שלי</a>
        </div>

        <!-- User controls (visible always, but only logout matters on mobile) -->
        <div class="user-controls">
            <span class="user-greeting">שלום משתמש</span>
            <a href="#" class="logout-btn">התנתק</a>
        </div>
    </nav>


    <main>
        <h1 style="color: var(--primary-color);">מתכונים חדשים</h1>
        
        <div class="search-container" style="margin: 20px 20px; text-align: center;">
            <input type="text" id="recipe-search" placeholder="חיפוש לפי שם או קטגוריה..." 
                   style="width: 100%; max-width: 400px; padding: 12px; font-size: 16px; border: 2px solid var(--accent-color, #ccc); border-radius: 8px; outline: none;">
        </div>

        <div id="recent-page-list" class="recipe-grid">
            <p>Loading recent recipes...</p>
        </div>
    </main>
    <!-- ===============================
         MOBILE BOTTOM NAV (Only Mobile)
         =============================== -->
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="material-symbols-outlined icon">home</span>
            <span>ראשי</span>
        </a>

        <a href="categories.html" class="nav-item">
            <span class="material-symbols-outlined icon">category</span>
            <span>קטגוריות</span>
        </a>

        <a href="upload.html" class="nav-item">
            <span class="material-symbols-outlined icon">upload</span>
            <span>העלאה</span>
        </a>

        <a href="my-recipes.html" class="nav-item">
            <span class="material-symbols-outlined icon">menu_book_2</span>
            <span>שלי</span>
        </a>
    </nav>

    <script src="../app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker failed', err));
            });
        }
    </script>
</body>
</html>
